<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSecure | Intelligence Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* CSS Section */
        :root {
            --primary-cyan: #00d2ff;
            --accent-orange: #ff6600; /* As per your requirement */
            --dark-bg: #02050a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Matrix/Circuit Background Effect */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.2;
        }

        .hero-container {
            text-align: center;
            padding: 40px;
            background: rgba(8, 14, 21, 0.6);
            border-radius: 30px;
            border: 1px solid rgba(0, 210, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-main {
            font-family: 'Orbitron', sans-serif;
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: 8px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #fff, var(--primary-cyan), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .tagline {
            font-size: 1.1rem;
            color: #8892b0;
            margin-bottom: 50px;
            letter-spacing: 1.5px;
            line-height: 1.6;
        }

        /* The "Wah Wah" Orange Button */
        .btn-portal {
            position: relative;
            background: var(--accent-orange);
            color: white;
            padding: 20px 50px;
            font-size: 1.3rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(255, 102, 0, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .btn-portal:hover {
            transform: scale(1.05);
            background: #ff8533;
            box-shadow: 0 15px 45px rgba(255, 102, 0, 0.6);
        }

        .btn-portal i {
            font-size: 1.4rem;
            transition: transform 0.4s;
        }

        .btn-portal:hover i {
            transform: translateX(10px);
        }

        /* Glowing Decorative Elements */
        .glow-circle {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.1) 0%, transparent 70%);
            top: -10%;
            right: -10%;
            z-index: -1;
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.5; }
            to { transform: scale(1.2); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="glow-circle"></div>

    <div class="hero-container">
        <h1 class="logo-main">CYBER<span>SECURE</span></h1>
        <p class="tagline">
            Next-Generation Digital Intelligence & Crime Monitoring System. <br>
            Secure. Fast. Advanced Analytics.
        </p>

        <a href="htmlarea.html" class="btn-portal">
            Enter Portal <i class="fas fa-bolt"></i>
        </a>
    </div>

    <script>
        /* JavaScript Section - Matrix Background */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const charList = "0101ABCDEFHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawBackground() {
            ctx.fillStyle = "rgba(2, 5, 10, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#00d2ff"; // Cyan color for matrix
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = charList[Math.floor(Math.random() * charList.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        setInterval(drawBackground, 35);
    </script>

</body>
</html>
