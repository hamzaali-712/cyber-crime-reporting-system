<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSecure - File a Complaint</title>
    <link rel="stylesheet" href="complaint_form.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="form-wrapper">
        <div class="form-container">
            <header class="form-header">
                <div class="logo">Cyber<span>Secure</span></div>
                <h1>Cyber Crime Reporting Portal</h1>
                <p>All fields marked with <span class="required">*</span> are mandatory.</p>
            </header>

            <form id="crimeForm">
                <div class="form-section">
                    <h3><i class="fas fa-user-shield"></i> Personal Information</h3>
                    <div class="input-grid">
                        <div class="input-group">
                            <label>Full Name <span class="required">*</span></label>
                            <input type="text" id="fullName" placeholder="Enter your full name" required>
                        </div>
                        <div class="input-group">
                            <label>CNIC <span class="required">*</span></label>
                            <input type="text" id="cnic" placeholder="12345-1234567-1" required>
                        </div>
                        <div class="input-group">
                            <label>Gender <span class="required">*</span></label>
                            <select id="gender" required>
                                <option value="">Select Option</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Mobile Number <span class="required">*</span></label>
                            <input type="tel" id="mobile" placeholder="Enter mobile number" required>
                        </div>
                        <div class="input-group">
                            <label>Email Address</label>
                            <input type="email" id="email" placeholder="Enter email address">
                        </div>
                        <div class="input-group">
                            <label>Occupation</label>
                            <select id="occupation">
                                <option value="">Select Option</option>
                                <option value="student">Student</option>
                                <option value="employed">Employed</option>
                                <option value="business">Business</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3><i class="fas fa-exclamation-triangle"></i> Incident Details</h3>
                    <div class="input-grid single-col">
                        <div class="input-group">
                            <label>Postal Address</label>
                            <input type="text" id="address" placeholder="Enter your postal address">
                        </div>
                    </div>
                    <div class="input-grid">
                        <div class="input-group">
                            <label>City <span class="required">*</span></label>
                            <select id="city" required>
                                <option value="">Select Option</option>
                                <option value="islamabad">Islamabad</option>
                                <option value="lahore">Lahore</option>
                                <option value="karachi">Karachi</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Crime Category <span class="required">*</span></label>
                            <select id="category" required>
                                <option value="">Select Option</option>
                                <option value="hacking">Hacking</option>
                                <option value="harassment">Cyber Harassment</option>
                                <option value="fraud">Financial Fraud</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Crime Details <span class="required">*</span></label>
                        <textarea id="details" rows="5" placeholder="Brief details of the crime (Max 3400 characters)" required></textarea>
                    </div>
                </div>

                <div class="form-section">
                    <h3><i class="fas fa-file-upload"></i> Evidence Upload</h3>
                    <p class="upload-note">Please upload any screenshots or videos (Max total size: 500MB).</p>
                    <div class="input-grid">
                        <div class="input-group">
                            <label>Upload Images (PNG, JPG)</label>
                            <div class="file-input-wrapper">
                                <input type="file" id="evidenceImages" accept="image/*" multiple onchange="validateFileSize(this)">
                                <i class="fas fa-images"></i>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Upload Video (MP4, MKV)</label>
                            <div class="file-input-wrapper">
                                <input type="file" id="evidenceVideo" accept="video/*" onchange="validateFileSize(this)">
                                <i class="fas fa-video"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-footer">
                    <button type="submit" class="submit-btn">Submit Complaint</button>
                </div>
            </form>
        </div>
    </div>

    <div id="customAlert" class="modal-overlay">
        <div class="modal-content">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h2>Report Submitted</h2>
            <p id="assignedText">Your complaint has been successfully registered.</p>
            <button id="doneBtn" class="modal-btn">Done</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script src="script.js"></script>

    <script>
        const crimeForm = document.getElementById('crimeForm');
        const customAlert = document.getElementById('customAlert');
        const doneBtn = document.getElementById('doneBtn');

        crimeForm.addEventListener('submit', function(e) {
            e.preventDefault();

            // 1. Database se officers ki list fetch karein
            db.ref('officers').once('value').then((snapshot) => {
                let assignedOfficerName = "General Queue";
                let assignedOfficerID = "Pending";

                if (snapshot.exists()) {
                    const officers = [];
                    snapshot.forEach((child) => {
                        officers.push(child.val());
                    });

                    // Randomly aik officer choose karein
                    const randomIdx = Math.floor(Math.random() * officers.length);
                    assignedOfficerName = officers[randomIdx].officerName;
                    assignedOfficerID = officers[randomIdx].officerID;
                }

                // 2. Form ka data collect karein
                const formData = {
                    fullName: document.getElementById('fullName').value,
                    cnic: document.getElementById('cnic').value,
                    gender: document.getElementById('gender').value,
                    mobile: document.getElementById('mobile').value,
                    email: document.getElementById('email').value,
                    occupation: document.getElementById('occupation').value,
                    address: document.getElementById('address').value,
                    city: document.getElementById('city').value,
                    category: document.getElementById('category').value,
                    details: document.getElementById('details').value,
                    assignedTo: assignedOfficerName,
                    assignedID: assignedOfficerID,
                    status: "Pending",
                    timestamp: new Date().toLocaleString()
                };

                // 3. Complaint ko Firebase mein save karein
                return db.ref('complaints').push(formData).then(() => {
                    // Success UI update
                    const modalPara = document.getElementById('assignedText');
                    modalPara.innerHTML = `Complaint registered successfully and assigned to:<br><strong>${assignedOfficerName} (${assignedOfficerID})</strong>`;
                    customAlert.style.display = 'flex';
                });
            }).catch((error) => {
                console.error("Critical Error:", error);
                alert("Database Error! Please ensure officers are enrolled first.");
            });
        });

        doneBtn.addEventListener('click', function() {
            window.location.href = 'htmlarea.html';
        });

        function validateFileSize(input) {
            if (input.files.length > 0) {
                const fileSize = input.files[0].size / 1024 / 1024;
                if (fileSize > 500) {
                    alert("File size exceeds 500MB!");
                    input.value = "";
                }
            }
        }
    </script>
</body>
</html>
